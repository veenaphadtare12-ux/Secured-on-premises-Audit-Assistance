version: '3.8'

services:
  postgres_ledger:
    image: postgres:15-alpine
    container_name: audit_ledger_db
    environment:
      POSTGRES_USER: audit_admin
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: corporate_ledger
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
    name: ledger_postgres_data